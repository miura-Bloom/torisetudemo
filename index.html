<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私のトリセツ | Bloom商事</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1e3a5f;
    --navy-dark: #162d4a;
    --navy-light: #eef2f7;
    --gold: #c9a84c;
    --white: #ffffff;
    --text: #1a2535;
    --text-light: #5a6a80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--navy-light);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap { width: 90%; max-width: 400px; }

  .brand { text-align: center; margin-bottom: 36px; }
  .brand h1 { font-size: 11px; color: var(--text-light); letter-spacing: 0.2em; }
  .brand h2 { font-size: 24px; font-weight: 700; color: var(--navy); }

  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 36px 32px;
    box-shadow: 0 12px 48px rgba(30,58,95,0.1);
  }

  .card p {
    text-align: center;
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 20px;
  }

  .input-wrap { margin-bottom: 14px; }
  .input-wrap input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #ccc;
  }

  .btn {
    width: 100%;
    padding: 15px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }

  .err {
    text-align: center;
    color: red;
    font-size: 12px;
    display: none;
  }

  .demo-link {
    text-align: center;
    margin-top: 12px;
    font-size: 12px;
  }
</style>
</head>

<body>

<div class="wrap">
  <div class="brand">
    <h1>BLOOM SHOJI CO., LTD.</h1>
    <h2>私のトリセツ</h2>
  </div>

  <div class="card">
    <p>このサイトは社内専用です。<br>パスワードを入力してご覧ください。</p>

    <div class="input-wrap">
      <input type="password" id="pw" placeholder="パスワードを入力">
    </div>

    <button class="btn" onclick="login()">ログイン</button>
    <p class="err" id="err">パスワードが違います</p>

    <!-- 🔥 デモ用リンク -->
    <div class="demo-link">
      <a href="?demo=1">※デモ閲覧はこちら</a>
    </div>
  </div>
</div>

<script>
  const PW = 'bloom26';

  // 🔥 デモURLならスキップ
  const params = new URLSearchParams(location.search);
  if(params.get('demo') === '1'){
    sessionStorage.setItem('auth','1');
    location.href = 'list.html';
  }

  document.getElementById('pw').addEventListener('keydown', e => {
    if(e.key === 'Enter') login();
  });

  function login() {
    if(document.getElementById('pw').value === PW) {
      sessionStorage.setItem('auth','1');
      location.href = 'list.html';
    } else {
      document.getElementById('err').style.display='block';
      document.getElementById('pw').value='';
    }
  }
</script>

</body>
</html>
