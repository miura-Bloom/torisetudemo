<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メンバー一覧 | 私のトリセツ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1e3a5f; --navy-light: #eef2f7;
    --gold: #c9a84c; --white: #fff;
    --text: #1a2535; --text-light: #5a6a80;
    --border: #dde3ec;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--navy-light); }

  header {
    background: var(--navy);
    padding: 16px;
    color: white;
  }
  .htitle { font-size: 18px; font-weight: bold; }

  .search-area { padding: 16px; }
  .search-area input {
    width: 100%; padding: 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .list { padding: 16px; }

  .card {
    background: white;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 8px;
    display: block;
    text-decoration: none;
    color: var(--text);
  }

  .name { font-weight: bold; }
  .role { font-size: 12px; color: var(--gold); }
  .called { font-size: 12px; color: var(--text-light); }

  .footer-note {
    margin-top: 40px;
    padding: 20px;
    border-top: 1px solid #eee;
    text-align: center;
    font-size: 12px;
    color: #6b7280;
    line-height: 1.8;
  }
</style>
</head>

<body>

<header>
  <div class="htitle">私のトリセツ（デモ）</div>
</header>

<div class="search-area">
  <input type="search" id="q" placeholder="検索" oninput="search()">
</div>

<div class="list" id="list"></div>

<!-- 🔥 ここが営業のキモ -->
<div class="footer-note">
  ※本デモは架空の企業設定です。<br>
  実際には、御社の課題（離職・コミュニケーション・定着など）に応じて<br>
  トリセツ内容をカスタマイズし、組織改善ツールとして提供します。
</div>

<script>
  if(!sessionStorage.getItem('auth')) location.href='index.html';

  const members = [
    {name:"佐藤 健一", role:"営業部長", called:"サトケンさん"},
    {name:"伊藤 結衣", role:"事務リーダー", called:"結衣さん"},
    {name:"高橋 宏樹", role:"所長", called:"ヒロさん"}
  ];

  function render(list){
    document.getElementById('list').innerHTML =
      list.map(m => `
        <div class="card">
          <div class="name">${m.name}</div>
          <div class="role">${m.role}</div>
          <div class="called">「${m.called}」と呼んでください</div>
        </div>
      `).join('');
  }

  function search(){
    const q = document.getElementById('q').value;
    const filtered = members.filter(m =>
      m.name.includes(q) || m.role.includes(q) || m.called.includes(q)
    );
    render(filtered);
  }

  render(members);
</script>

</body>
</html>
